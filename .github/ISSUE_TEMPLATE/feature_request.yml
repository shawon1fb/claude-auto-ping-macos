name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what is missing or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or UI you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, if any.

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This keeps the app local-only (no network, no telemetry).
          required: true
        - label: This does not attempt to bypass Claude usage limits or automate login/CAPTCHA.
          required: true
