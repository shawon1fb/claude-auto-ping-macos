name: Release

# Template release workflow. Builds an unsigned app on tag push and attaches it to
# the GitHub Release. Signing and notarization are intentionally left out so this
# runs without secrets; see docs/release-process.md to add Developer ID signing,
# notarization, and signed assets.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & attach assets
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print tool versions
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release (unsigned)
        run: ./Scripts/build-release.sh

      - name: Package app
        run: |
          ditto -c -k --keepParent \
            build/ClaudeAutoPingMacos.app \
            build/ClaudeAutoPingMacos-${{ github.ref_name }}.zip

      # To ship signed, notarized builds, insert codesign + notarytool + stapler
      # steps here using repository secrets. See docs/release-process.md.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: build/ClaudeAutoPingMacos-${{ github.ref_name }}.zip
